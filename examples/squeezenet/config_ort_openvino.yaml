version: 1

model:
  name: squeezenet1_1
  path: examples/squeezenet/assets/model.onnx
  tasks:
    - classification

input:
  type: npz
  path: examples/squeezenet/inputs
  pattern: "*.npz"
  input_name: input_tensor
  backend_name: data
  npz_key: data
  dtype: float32

outputs:
  logits: squeezenet0_flatten0_reshape0

variants:
  - ort_cpu
  - openvino_cpu

compare: reference-to-all

metrics:
  raw:
    - tensor_diff:
        outputs:
          - logits
        atol: 0.000001
        rtol: 0.000001
        percentiles:
          - 95
          - 99

report:
  output_dir: examples/squeezenet/reports_ort_openvino
  formats:
    - json
    - dashboard
    - csv
