version: 1

common:
  model:
    name: squeezenet1_1
    source_path: examples/squeezenet/assets/model.onnx
    format: onnx
    tasks:
      - classification

  variants:
    - name: ort_cpu_ref
      backend: onnxruntime
      role: reference
      builder:
        class: trt_profiler.builders.OnnxPassthroughBuilder
        config: {}
      runner:
        class: trt_profiler.runners.OnnxRuntimeRunner
        config:
          providers:
            - CPUExecutionProvider

    - name: ort_cpu_target
      backend: onnxruntime
      role: target
      builder:
        class: trt_profiler.builders.OnnxPassthroughBuilder
        config: {}
      runner:
        class: trt_profiler.runners.OnnxRuntimeRunner
        config:
          providers:
            - CPUExecutionProvider

  dataset:
    type: npz_folder
    config:
      path: examples/squeezenet/inputs
      pattern: "*.npz"

  comparisons:
    - name: ort_cpu_ref_vs_ort_cpu_target
      reference: ort_cpu_ref
      target: ort_cpu_target

  input_mapping:
    ort_cpu_ref:
      data: input_tensor
    ort_cpu_target:
      data: input_tensor

  output_mapping:
    ort_cpu_ref:
      logits: squeezenet0_flatten0_reshape0
    ort_cpu_target:
      logits: squeezenet0_flatten0_reshape0

  metrics:
    raw:
      - name: logits_tensor_diff
        class: trt_profiler.metrics.TensorDiffMetric
        config:
          outputs:
            - logits
          atol: 0.000001
          rtol: 0.000001
          percentiles:
            - 95
            - 99
    post:
      - name: classification_consistency
        class: trt_profiler.metrics.ClassificationConsistencyMetric
        config:
          probs_key: probs
          topk:
            - 1
            - 5

  report:
    reporters:
      - class: trt_profiler.report.JsonReporter
        config:
          path: examples/squeezenet/reports_postprocess/report.json
      - class: trt_profiler.report.PlotlyDashboardReporter
        config:
          path: examples/squeezenet/reports_postprocess/dashboard.html
      - class: trt_profiler.report.CsvReporter
        config:
          output_dir: examples/squeezenet/reports_postprocess/csv

preprocess:
  class: trt_profiler.preprocessors.NpzPreprocessor
  config:
    inputs:
      - name: input_tensor
        npz_key: data
        dtype: float32

postprocessors:
  - name: softmax
    class: trt_profiler.postprocessors.SoftmaxPostprocessor
    config:
      logits_key: logits
      probs_key: probs
      axis: -1
      squeeze: true
