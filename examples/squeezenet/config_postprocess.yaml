version: 1

model:
  name: squeezenet1_1
  path: examples/squeezenet/assets/model.onnx
  tasks:
    - classification

input:
  type: npz
  path: examples/squeezenet/inputs
  pattern: "*.npz"
  input_name: input_tensor
  backend_name: data
  npz_key: data
  dtype: float32

outputs:
  logits: squeezenet0_flatten0_reshape0

variants:
  - name: ort_cpu_ref
    preset: ort_cpu
  - name: ort_cpu_target
    preset: ort_cpu

compare: configured

metrics:
  raw:
    - tensor_diff:
        outputs:
          - logits
        atol: 0.000001
        rtol: 0.000001
        percentiles:
          - 95
          - 99
  post:
    - classification_consistency:
        probs_key: probs
        topk:
          - 1
          - 5

postprocess:
  type: softmax
  logits_key: logits
  probs_key: probs
  axis: -1
  squeeze: true

report:
  output_dir: examples/squeezenet/reports_postprocess
  formats:
    - json
    - dashboard
    - csv
