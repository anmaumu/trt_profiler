version: 1

model:
  name: squeezenet1_1
  path: examples/squeezenet/assets/model.onnx
  tasks:
    - classification

input:
  type: video_file
  path: examples/squeezenet/videos/sample.mp4
  input_name: input
  backend_name: data
  frame_stride: 5
  max_frames_per_video: 3

outputs:
  logits: squeezenet0_flatten0_reshape0

variants:
  - ort_cpu
  - openvino_cpu

compare: reference-to-all

preprocess:
  type: imagenet
  input_name: input
  size:
    - 224
    - 224
  layout: NCHW
  dtype: float32

metrics:
  raw:
    - tensor_diff:
        outputs:
          - logits
        percentiles:
          - 95
          - 99

report:
  output_dir: examples/squeezenet/reports_video_ort_openvino
  formats:
    - json
    - dashboard
