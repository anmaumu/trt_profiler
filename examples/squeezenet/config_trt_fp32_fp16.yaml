version: 1

common:
  model:
    name: squeezenet1_1
    source_path: examples/squeezenet/assets/model.onnx
    format: onnx
    tasks:
      - classification

  variants:
    - name: trt_fp32
      backend: tensorrt
      role: reference
      precision: fp32
      builder:
        class: trt_profiler.builders.TensorRTBuilder
        config:
          build: true
          builder_backend: trtexec
          trtexec: .local_tensorrt/usr/bin/trtexec
          engine_path: examples/squeezenet/artifacts/model_fp32.plan
          precision: fp32
      runner:
        class: trt_profiler.runners.TensorRTRunner
        config:
          device_id: 0

    - name: trt_fp16
      backend: tensorrt
      role: target
      precision: fp16
      builder:
        class: trt_profiler.builders.TensorRTBuilder
        config:
          build: true
          builder_backend: trtexec
          trtexec: .local_tensorrt/usr/bin/trtexec
          engine_path: examples/squeezenet/artifacts/model_fp16.plan
          precision: fp16
      runner:
        class: trt_profiler.runners.TensorRTRunner
        config:
          device_id: 0

  dataset:
    type: npz_folder
    config:
      path: examples/squeezenet/inputs
      pattern: "*.npz"

  comparisons:
    - name: trt_fp32_vs_trt_fp16
      reference: trt_fp32
      target: trt_fp16

  input_mapping:
    trt_fp32:
      data: input_tensor
    trt_fp16:
      data: input_tensor

  output_mapping:
    trt_fp32:
      logits: squeezenet0_flatten0_reshape0
    trt_fp16:
      logits: squeezenet0_flatten0_reshape0

  metrics:
    raw:
      - name: logits_tensor_diff
        class: trt_profiler.metrics.TensorDiffMetric
        config:
          outputs:
            - logits
          percentiles:
            - 95
            - 99
    post: []

  report:
    reporters:
      - class: trt_profiler.report.JsonReporter
        config:
          path: examples/squeezenet/reports_trt/report.json
      - class: trt_profiler.report.PlotlyDashboardReporter
        config:
          path: examples/squeezenet/reports_trt/dashboard.html
      - class: trt_profiler.report.CsvReporter
        config:
          output_dir: examples/squeezenet/reports_trt/csv

preprocess:
  class: trt_profiler.preprocessors.NpzPreprocessor
  config:
    inputs:
      - name: input_tensor
        npz_key: data
        dtype: float32

postprocessors:
  - name: identity
    class: trt_profiler.postprocessors.IdentityPostprocessor
    config: {}
