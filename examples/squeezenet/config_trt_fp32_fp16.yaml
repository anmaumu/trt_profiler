version: 1

model:
  name: squeezenet1_1
  path: examples/squeezenet/assets/model.onnx
  tasks:
    - classification

input:
  type: npz
  path: examples/squeezenet/inputs
  pattern: "*.npz"
  input_name: input_tensor
  backend_name: data
  npz_key: data
  dtype: float32

outputs:
  logits: squeezenet0_flatten0_reshape0

variants:
  - trt_fp32
  - trt_fp16

compare: configured

tensor_rt:
  artifacts_dir: examples/squeezenet/artifacts

metrics:
  raw:
    - tensor_diff:
        outputs:
          - logits
        percentiles:
          - 95
          - 99

report:
  output_dir: examples/squeezenet/reports_trt
  formats:
    - json
    - dashboard
    - csv
