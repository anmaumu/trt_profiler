version: 1

model:
  name: squeezenet1_1
  path: examples/squeezenet/assets/model.onnx
  tasks:
    - classification

input:
  type: npz
  path: examples/squeezenet/inputs
  pattern: "*.npz"
  input_name: input_tensor
  backend_name: data
  npz_key: data
  dtype: float32

outputs:
  logits: squeezenet0_flatten0_reshape0

variants:
  - name: ort_cpu
    preset: ort_cpu
    role: reference
  - name: ort_cuda
    preset: ort_cuda
    role: reference
  - name: ort_trt
    preset: ort_trt
  - openvino_cpu
  - trt_fp32
  - trt_fp16

comparisons:
  - name: ort_cpu_vs_ort_cuda
    reference: ort_cpu
    target: ort_cuda
  - name: ort_cuda_vs_ort_trt
    reference: ort_cuda
    target: ort_trt
  - name: ort_cuda_vs_openvino_cpu
    reference: ort_cuda
    target: openvino_cpu
  - name: ort_cuda_vs_trt_fp32
    reference: ort_cuda
    target: trt_fp32
  - name: ort_cuda_vs_trt_fp16
    reference: ort_cuda
    target: trt_fp16
  - name: trt_fp32_vs_trt_fp16
    reference: trt_fp32
    target: trt_fp16

tensor_rt:
  artifacts_dir: examples/squeezenet/artifacts

metrics:
  raw:
    - tensor_diff:
        outputs:
          - logits
        atol: 0.000001
        rtol: 0.000001
        percentiles:
          - 95
          - 99

report:
  output_dir: examples/squeezenet/reports_full
  formats:
    - json
    - dashboard
    - csv
